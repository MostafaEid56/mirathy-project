# ============================================================
# Mirathy — Shared Configuration
# ============================================================
spring.application.name=mirathy
server.port=${SERVER_PORT:8087}

# Active Profile (override with env var SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---- Database (Neon PostgreSQL) ----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mirathy}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA ----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ---- JWT ----
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ---- CORS ----
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ---- Mail ----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ---- Application ----
application.security.miling.frontend.activation-url=${ACTIVATION_URL:http://localhost:4200/activate-account}

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
