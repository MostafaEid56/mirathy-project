version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./mawaris-master
    ports:
      - "9095:80"
    restart: unless-stopped
    depends_on:
      - backend
